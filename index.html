<!DOCTYPE html>
<html lang="it">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>La Mia Radio HQ</title>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
		<link rel="stylesheet" href="./style.css">
	</head>
	
	<body>
		<div class="app-wrapper">
			<div class="player-panel">
				<div class="header">
					<h1><i class="fa-solid fa-radio"></i> La Mia Radio HQ</h1>
					<p>Streaming Alta Qualità & Fluent UI</p>
				</div>
				
				<audio id="radioPlayer" preload="none"></audio>
				
				<div class="radio-selection">
					<div class="radio-card" id="rdsCard">
						<i class="fa-solid fa-circle-play play-indicator"></i>
						<img src="https://upload.wikimedia.org/wikipedia/commons/7/73/RDS-Logo.png" alt="RDS Logo" class="radio-logo">
						<div class="radio-info">
							<span class="radio-name">RDS</span>
						</div>
					</div>
					
					<div class="radio-card" id="rtlCard">
						<i class="fa-solid fa-circle-play play-indicator"></i>
						<img src="https://upload.wikimedia.org/wikipedia/commons/e/e6/RTL_102.5_%28logo%29.png" alt="RTL 102.5 Logo" class="radio-logo">
						<div class="radio-info">
							<span class="radio-name">RTL 102.5</span>
						</div>
					</div>
					
					<div class="radio-card" id="rtlCalienteCard">
						<i class="fa-solid fa-circle-play play-indicator"></i>
						<img src="https://upload.wikimedia.org/wikipedia/commons/e/e6/RTL_102.5_%28logo%29.png" alt="RTL 102.5 Caliente Logo" class="radio-logo">
						<div class="radio-info">
							<span class="radio-name">RTL 102.5 Caliente</span>
						</div>
					</div>
					
					<div class="radio-card" id="rtlDiscoCard">
						<i class="fa-solid fa-circle-play play-indicator"></i>
						<img src="https://upload.wikimedia.org/wikipedia/commons/e/e6/RTL_102.5_%28logo%29.png" alt="RTL 102.5 Disco Logo" class="radio-logo">
						<div class="radio-info">
							<span class="radio-name">RTL 102.5 Disco</span>
						</div>
					</div>
					
					<div class="radio-card" id="zetaCard">
						<i class="fa-solid fa-circle-play play-indicator"></i>
						<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c4/Radio_Zeta_-_Logo_2020.svg/330px-Radio_Zeta_-_Logo_2020.svg.png" alt="Radio Zeta Logo" class="radio-logo">
						<div class="radio-info">
							<span class="radio-name">Radio Zeta</span>
						</div>
					</div>
					
					<div class="radio-card" id="ibizaCard">
						<i class="fa-solid fa-circle-play play-indicator"></i>
						<img src="https://radioibiza.it/wp-content/uploads/2021/09/cropped-logo_header.png" alt="Radio Ibiza Logo" class="radio-logo">
						<div class="radio-info">
							<span class="radio-name">Radio Ibizia</span>
						</div>
					</div>

				</div>
				
				<button class="stop-btn" id="stopBtn">
					<i class="fa-solid fa-power-off"></i> FERMA RIPRODUZIONE
				</button>
				
				<div class="volume-controls">
					<div class="vol-btn" id="volCustomBtn">
						<i class="fa-solid fa-sliders"></i>
						<span>VOLUME<br>CUSTOM</span>
					</div>
					
					<div class="vol-btn" id="vol20Btn">
						<i class="fa-solid fa-volume-off"></i>
						<span>20%</span>
					</div>
					
					<div class="vol-btn" id="vol50Btn">
						<i class="fa-solid fa-volume-low"></i>
						<span>50%</span>
					</div>
					
					<div class="vol-btn" id="vol100Btn">
						<i class="fa-solid fa-volume-high"></i>
						<span>100%</span>
					</div>
				</div>
				
				<div class="input-row">
					<i class="fa-solid fa-keyboard"></i>
					<input type="number" id="customVolInput" placeholder="0-100" min="0" max="100">
					<button class="apply-btn" id="applyVolBtn"><i class="fa-solid fa-arrow-right"></i></button>
				</div>
			</div>
		</div>
		
        <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
		<script>
			const player = document.getElementById("radioPlayer");
			player.volume = 0.5;
			let currentUrl = "";
            let hls = null; // Variabile per gestire il player HLS
			
            // Funzione di supporto per far partire l'audio e settare i metadati
            const startPlaybackAndMetadata = (url, cardId, radioData) => {
                player.play().then(() => {
					currentUrl = url;
					document.getElementById(cardId).classList.add('active');
					
					if ('mediaSession' in navigator) {
						navigator.mediaSession.metadata = new MediaMetadata({
							title: radioData[cardId].name,
							artist: 'La Mia Radio HQ',
							artwork: [
								{ src: radioData[cardId].logo, sizes: '512x512', type: 'image/png' }
							]
						});
						
						navigator.mediaSession.setActionHandler('pause', function() {
							window.stopRadio();
						});
					}
				}).catch(err => {
					console.error("Errore riproduzione:", err);
				});
            };

			window.playRadio = function(url, cardId) {
                if (currentUrl === url) return;

				document.querySelectorAll('.radio-card').forEach(card => card.classList.remove('active'));
				player.pause();
				
                // Distruggiamo l'istanza HLS precedente se esiste
                if (hls) {
                    hls.destroy();
                    hls = null;
                }

				const radioData = {
					'rdsCard': { name: 'RDS', logo: 'https://upload.wikimedia.org/wikipedia/commons/7/73/RDS-Logo.png' },
					'rtlCard': { name: 'RTL 102.5', logo: 'https://upload.wikimedia.org/wikipedia/commons/e/e6/RTL_102.5_%28logo%29.png' },
					'rtlCalienteCard': { name: 'RTL 102.5 Caliente', logo: 'https://upload.wikimedia.org/wikipedia/commons/e/e6/RTL_102.5_%28logo%29.png' },
					'rtlDiscoCard': { name: 'RTL 102.5 Disco', logo: 'https://upload.wikimedia.org/wikipedia/commons/e/e6/RTL_102.5_%28logo%29.png' },
					'zetaCard': { name: 'Radio Zeta', logo: 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c4/Radio_Zeta_-_Logo_2020.svg/330px-Radio_Zeta_-_Logo_2020.svg.png' },
					'ibizaCard': { name: 'Radio Ibiza', logo: 'https://radioibiza.it/wp-content/uploads/2021/09/cropped-logo_header.png' }
				};
				
                // Controllo: è un flusso HLS (.m3u8) o uno normale (mp3/aac)?
                if (url.endsWith('.m3u8')) {
                    if (Hls.isSupported()) {
                        hls = new Hls();
                        hls.loadSource(url);
                        hls.attachMedia(player);
                        hls.on(Hls.Events.MANIFEST_PARSED, function () {
                            startPlaybackAndMetadata(url, cardId, radioData);
                        });
                    } else if (player.canPlayType('application/vnd.apple.mpegurl')) {
                        // Fallback per Safari
                        player.src = url;
                        startPlaybackAndMetadata(url, cardId, radioData);
                    }
                } else {
                    // Flusso standard
                    player.src = url;
                    startPlaybackAndMetadata(url, cardId, radioData);
                }
			}
			
			window.stopRadio = function() {
				player.pause();
				player.src = "";
				currentUrl = "";
                if (hls) {
                    hls.destroy();
                    hls = null;
                }
				document.querySelectorAll('.radio-card').forEach(card => card.classList.remove('active'));
			}
			
			window.setVolume = function(level) {
				player.volume = level;
			}
			
			window.setCustomVolume = function() {
				let inputBox = document.getElementById('customVolInput');
				if(!inputBox) return;
				
				let volValue = parseInt(inputBox.value);
				if (!isNaN(volValue)) {
					volValue = Math.min(Math.max(volValue, 0), 100);
					player.volume = volValue / 100;
					inputBox.value = volValue;
				}
			}
			
			document.addEventListener('DOMContentLoaded', () => {
                // Nuovi flussi aggiornati integrati
				document.getElementById('rdsCard')?.addEventListener('click', () => window.playRadio('https://icstream.rds.radio/rds', 'rdsCard'));
				document.getElementById('rtlCard')?.addEventListener('click', () => window.playRadio('https://streamingv2.shoutcast.com/rtl-1025', 'rtlCard'));
				document.getElementById('zetaCard')?.addEventListener('click', () => window.playRadio('https://dd782ed59e2a4e86aabf6fc508674b59.msvdn.net/live/S9346184/XEx1LqlYbNic/playlist_video.m3u8', 'zetaCard'));
				document.getElementById('rtlCalienteCard')?.addEventListener('click', () => window.playRadio('https://dd782ed59e2a4e86aabf6fc508674b59.msvdn.net/live/S8448465/zTYa1Z5Op9ue/playlist_video.m3u8', 'rtlCalienteCard'));
				document.getElementById('rtlDiscoCard')?.addEventListener('click', () => window.playRadio('https://dd782ed59e2a4e86aabf6fc508674b59.msvdn.net/live/S51100361/0Fb4R3k82b5Z/playlist_video.m3u8', 'rtlDiscoCard'));
				document.getElementById('ibizaCard')?.addEventListener('click', () => window.playRadio('https://ice07.fluidstream.net/Ibiza.mp3', 'ibizaCard'));
				
                document.getElementById('stopBtn')?.addEventListener('click', () => window.stopRadio());
				document.getElementById('volCustomBtn')?.addEventListener('click', () => window.setCustomVolume());
				document.getElementById('vol20Btn')?.addEventListener('click', () => window.setVolume(0.2));
				document.getElementById('vol50Btn')?.addEventListener('click', () => window.setVolume(0.5));
				document.getElementById('vol100Btn')?.addEventListener('click', () => window.setVolume(1.0));
				document.getElementById('applyVolBtn')?.addEventListener('click', () => window.setCustomVolume());
			});
			
			document.addEventListener('keydown', async function (e) {
				if (document.activeElement.id === 'customVolInput') {
					if (e.key === 'Enter') {
						window.setCustomVolume();
						document.activeElement.blur();
					}
					return;
				}
			});
		</script>
	</body>
</html>
